<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Reset password — ARCH-AFRICA</title>
<link rel="icon" href="assets/arch-africa-logo.png" type="image/png"/>
<link rel="apple-touch-icon" href="assets/arch-africa-logo.png"/>
<link rel="stylesheet" href="styles.css"/>

</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem">
  <div class="modal-card" style="max-width:400px;width:100%">
    <h2 class="auth-h2">Set new password</h2>
    <form id="resetForm" style="display:flex;flex-direction:column;gap:.9rem;margin-top:1rem">
      <div class="f-field"><label>New password</label><input type="password" id="newPw" minlength="8" required/></div>
      <div class="f-field"><label>Confirm</label><input type="password" id="newPwC" minlength="8" required/></div>
      <button class="btn-full" type="submit">Update password</button>
      <p id="resetMsg" class="auth-msg"></p>
    </form>
    <a href="index.html" class="contact-link" style="display:block;text-align:center;margin-top:1rem">← Login</a>
  </div>
  <a class="whatsapp-float" href="https://wa.me/250788000000?text=Hello%20ARCH-AFRICA%2C%20I%20need%20help%20with%20a%20project." target="_blank" rel="noopener" aria-label="Contact us on WhatsApp">
    <span class="whatsapp-icon">💬</span>
    <span class="whatsapp-label">WhatsApp</span>
  </a>
  <script src="js/api.js"></script>
  <script src="js/analytics.js"></script>
  <script>
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const token = new URLSearchParams(location.search).get('token');
      const password = document.getElementById('newPw').value;
      const c = document.getElementById('newPwC').value;
      const msg = document.getElementById('resetMsg');
      if (password !== c) { msg.textContent = 'Passwords do not match'; msg.className = 'auth-msg err'; return; }
      try {
        await API.auth.reset(token, password);
        msg.textContent = 'Password updated! Redirecting…'; msg.className = 'auth-msg ok';
        setTimeout(() => location.href = 'index.html', 2000);
      } catch (err) {
        msg.textContent = err.message; msg.className = 'auth-msg err';
      }
    });
  </script>
</body>
</html>
